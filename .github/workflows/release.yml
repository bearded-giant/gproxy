name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: build CLI + daemon
        run: cargo build --release --target ${{ matrix.target }} -p giantd -p giant-proxy-cli

      - name: package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/giantd dist/
          cp target/${{ matrix.target }}/release/giant-proxy dist/
          tar czf giant-proxy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: giant-proxy-${{ matrix.target }}
          path: giant-proxy-*.tar.gz

  build-tauri:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: build sidecars
        run: |
          cargo build --release --target aarch64-apple-darwin -p giantd -p giant-proxy-cli
          mkdir -p crates/giant-proxy-ui/src-tauri/binaries
          cp target/aarch64-apple-darwin/release/giantd crates/giant-proxy-ui/src-tauri/binaries/giantd-aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/giant-proxy crates/giant-proxy-ui/src-tauri/binaries/giant-proxy-aarch64-apple-darwin

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/giant-proxy-ui/pnpm-lock.yaml

      - name: install frontend deps
        working-directory: crates/giant-proxy-ui
        run: pnpm install

      - name: clean stale bundle artifacts
        run: rm -rf target/aarch64-apple-darwin/release/bundle

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/giant-proxy-ui
          tauriScript: pnpm tauri
          args: --target aarch64-apple-darwin --verbose
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}

  release:
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest

    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: upload CLI tarballs to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
