name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: install system deps (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: build CLI + daemon
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p giantd -p giant-proxy-cli
          else
            cargo build --release --target ${{ matrix.target }} -p giantd -p giant-proxy-cli
          fi

      - name: package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/giantd dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/giant-proxy dist/ 2>/dev/null || true
          tar czf giant-proxy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: giant-proxy-${{ matrix.target }}
          path: giant-proxy-*.tar.gz

  build-tauri:
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - os: ubuntu-latest
            rust_targets: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: install system deps (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      # build giantd for sidecar bundling (must happen before tauri build)
      - name: build giantd sidecar (macOS universal)
        if: runner.os == 'macOS'
        run: |
          cargo build --release --target aarch64-apple-darwin -p giantd
          cargo build --release --target x86_64-apple-darwin -p giantd
          mkdir -p crates/giant-proxy-ui/src-tauri/binaries
          lipo -create \
            target/aarch64-apple-darwin/release/giantd \
            target/x86_64-apple-darwin/release/giantd \
            -output crates/giant-proxy-ui/src-tauri/binaries/giantd-universal-apple-darwin

      - name: build giantd sidecar (linux)
        if: runner.os == 'Linux'
        run: |
          cargo build --release -p giantd
          mkdir -p crates/giant-proxy-ui/src-tauri/binaries
          cp target/release/giantd crates/giant-proxy-ui/src-tauri/binaries/giantd-x86_64-unknown-linux-gnu

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/giant-proxy-ui/pnpm-lock.yaml

      - name: install frontend deps
        working-directory: crates/giant-proxy-ui
        run: pnpm install

      - name: build tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/giant-proxy-ui
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}

  release:
    needs: [build-cli, build-tauri]
    runs-on: ubuntu-latest

    steps:
      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: upload CLI tarballs to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
